<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EbookTranslator</title>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FCF9F5; --card: #FFFFFF; --text: #2D2D2D; --text2: #8A8A8A;
      --accent: #C8956C; --accent-hover: #B8845B; --accent-light: #F5EDE6;
      --border: #EDE8E2; --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --radius: 16px; --serif: 'Noto Serif SC', 'Georgia', serif;
      --sans: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { max-width: 960px; margin: 0 auto; padding: 0 32px; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header { padding: 40px 0 32px; display: flex; align-items: center; gap: 12px; }
    .logo { font-family: var(--serif); font-size: 22px; font-weight: 700; letter-spacing: -0.5px; flex: 1; color: var(--accent); }

    /* Lang Toggle */
    .lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; font-size: 12px; font-weight: 600; }
    .lang-toggle button { padding: 6px 12px; border: none; background: transparent; cursor: pointer; color: var(--text2); transition: all 0.2s; font-family: var(--sans); }
    .lang-toggle button.active { background: var(--accent); color: #fff; }

    /* Buttons */
    .btn { font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 10px 22px; border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(200,149,108,0.3); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--card); color: var(--text); }
    .btn-danger { background: #E85D5D; color: #fff; }
    .btn-danger:hover { background: #D44D4D; }
    .btn-download { background: #5DAA7E; color: #fff; box-shadow: 0 2px 8px rgba(93,170,126,0.3); }
    .btn-download:hover { background: #4D9A6E; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: all 0.2s; }
    .icon-btn:hover { background: var(--card); color: var(--text); }

    /* Welcome */
    .welcome { flex: 1; display: flex; align-items: center; justify-content: center; }
    .welcome-inner { text-align: center; width: 100%; }
    .welcome-icon { width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 20px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; }
    .welcome-icon svg { width: 32px; height: 32px; color: var(--accent); }
    .welcome h2 { font-family: var(--serif); font-size: 26px; font-weight: 600; margin-bottom: 8px; }
    .welcome p { color: var(--text2); font-size: 14px; margin-bottom: 28px; line-height: 1.7; }
    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 36px; cursor: pointer; transition: all 0.3s; position: relative; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--accent-light); }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-zone p { font-size: 14px; color: var(--text2); }
    .upload-zone p strong { color: var(--text); font-weight: 500; }

    /* Book Card */
    .book-view { flex: 1; display: none; flex-direction: column; padding-bottom: 100px; }
    .book-view.active { display: flex; }
    .book-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; display: flex; gap: 24px; align-items: flex-start; }
    .book-icon { width: 64px; height: 80px; border-radius: 10px; background: linear-gradient(135deg, var(--accent-light), #E8E2DB); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .book-icon svg { width: 28px; height: 28px; color: var(--accent); }
    .book-info { flex: 1; min-width: 0; }
    .book-title { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 4px; word-break: break-word; }
    .book-author { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
    .book-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
    .meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .meta-item strong { color: var(--text); font-weight: 500; }
    .book-actions { margin-top: 24px; display: flex; gap: 10px; }
    .scanned-badge { display: none; margin-top: 12px; padding: 8px 14px; background: #FFF3E0; border: 1px solid #FFB74D; border-radius: 8px; font-size: 13px; color: #E65100; align-items: center; gap: 6px; }
    .scanned-badge.show { display: inline-flex; }

    /* Progress */
    .progress-bar-wrap { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: var(--card); border-top: 1px solid var(--border); padding: 16px 24px; transform: translateY(100%); transition: transform 0.3s; }
    .progress-bar-wrap.active { transform: translateY(0); }
    .progress-inner { max-width: 960px; margin: 0 auto; padding: 0 32px; }
    .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 13px; color: var(--text2); }
    .progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
    .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; width: 0%; background: linear-gradient(90deg, var(--accent), #D4A882); transition: width 0.4s; }
    .progress-detail { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: var(--text2); }

    /* Upload Progress (inside upload-zone) */
    .upload-zone.uploading { cursor: default; pointer-events: none; }
    .upload-zone.uploading > p { display: none; }
    .upload-progress { width: 100%; }
    .upload-progress .up-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .upload-progress .up-icon { color: var(--accent); flex-shrink: 0; }
    .upload-progress .up-filename { font-size: 14px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .upload-progress .up-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .upload-progress .up-fill { height: 100%; border-radius: 3px; width: 0%; background: linear-gradient(90deg, var(--accent), #D4A882); transition: width 0.3s; }
    .upload-progress .up-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
    .upload-progress .up-meta span { min-width: 50px; }
    .upload-progress .up-meta span:first-child { text-align: left; }
    .upload-progress .up-meta span:nth-child(2) { text-align: center; font-weight: 600; color: var(--accent); }
    .upload-progress .up-meta span:last-child { text-align: right; }

    /* Settings Modal */
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.15); width: 100%; max-width: 420px; margin: 16px; overflow: hidden; }
    .modal-header { padding: 24px 24px 16px; display: flex; align-items: center; gap: 12px; }
    .modal-header h3 { font-family: var(--serif); font-size: 18px; font-weight: 600; flex: 1; }
    .modal-close { width: 32px; height: 32px; border: none; background: none; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
    .modal-close:hover { background: var(--accent-light); }
    .modal-body { padding: 0 24px 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .field input, .field select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: var(--sans); font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field-hint { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .settings-divider { padding: 8px 0 4px; margin-bottom: 8px; border-top: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

    /* Disclaimer */
    .disclaimer { padding: 32px 0 40px; text-align: center; }
    .disclaimer p { font-size: 12px; color: var(--text2); line-height: 1.8; max-width: 480px; margin: 0 auto; }

    /* Toast */
    .toast { position: fixed; top: 24px; right: 24px; z-index: 200; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.12); transform: translateX(120%); transition: transform 0.3s; }
    .toast.show { transform: translateX(0); }
    .toast-success { background: #E8F5EE; color: #2D7A4F; }
    .toast-error { background: #FDECEC; color: #B83232; }

    /* ── Preview Panel ────────────────────────────────────────────── */
    .preview-toggle { margin-left: auto; }
    .preview-toggle.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

    .preview-panel {
      margin-top: 16px;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .preview-panel.active {
      max-height: 70vh;
      opacity: 1;
      overflow-y: auto;
    }

    .preview-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .preview-tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none; border-left: none; border-right: none;
      font-family: var(--sans);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .preview-tab:hover { color: var(--text); }
    .preview-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* EPUB Cover */
    .preview-cover { padding: 24px; text-align: center; }
    .preview-cover img { max-width: 100%; max-height: 50vh; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

    /* EPUB TOC */
    .preview-toc-list { list-style: none; padding: 8px; margin: 0; }
    .preview-toc-item {
      padding: 10px 16px; border-radius: 8px; cursor: pointer;
      font-size: 14px; color: var(--text); transition: background 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .preview-toc-item:hover { background: var(--accent-light); }
    .preview-toc-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .preview-toc-item .toc-bullet { width: 4px; height: 4px; border-radius: 50%; background: var(--text2); flex-shrink: 0; }

    /* EPUB Chapter Reader */
    .preview-reader {
      padding: 24px 32px;
      line-height: 1.8;
      font-family: var(--serif);
      font-size: 15px;
      color: var(--text);
      max-width: 100%;
      overflow-x: auto;
      min-height: 200px;
      content-visibility: auto;
      contain-intrinsic-size: auto 2000px;
    }
    .preview-reader p { margin-bottom: 1em; }
    .preview-reader img { max-width: 100%; height: auto; border-radius: 4px; }
    .preview-reader h1, .preview-reader h2, .preview-reader h3 {
      font-family: var(--serif); margin-top: 1.5em; margin-bottom: 0.5em;
    }

    /* Loading animation */
    .preview-reader-loading {
      display: flex; align-items: center; justify-content: center;
      padding: 48px; color: var(--text2); font-size: 14px;
    }
    .preview-reader-loading::after {
      content: ''; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PDF Pages */
    .preview-pages { padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: #f0f0f0; }
    .preview-page-wrap { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; max-width: 100%; content-visibility: auto; contain-intrinsic-size: auto 600px; }
    .preview-page-img { display: block; width: 100%; height: auto; max-height: 90vh; object-fit: contain; }
    .preview-page-label { font-size: 12px; color: var(--text2); text-align: center; padding: 4px 0 8px; }

    /* PDF Text */
    .preview-text-page { padding: 20px 24px; border-bottom: 1px solid var(--border); content-visibility: auto; contain-intrinsic-size: auto 200px; }
    .preview-text-header { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .preview-text-content { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; font-family: var(--serif); }

    /* DOCX Preview */
    .docx-preview { padding: 24px 32px; font-family: var(--serif); font-size: 15px; color: var(--text); line-height: 1.8; }
    .docx-preview h1 { font-size: 22px; font-weight: 700; margin: 1.2em 0 0.4em; }
    .docx-preview h2 { font-size: 18px; font-weight: 600; margin: 1em 0 0.3em; }
    .docx-preview h3 { font-size: 16px; font-weight: 600; margin: 0.8em 0 0.3em; }
    .docx-preview h4 { font-size: 15px; font-weight: 600; margin: 0.6em 0 0.2em; }
    .docx-preview p { margin-bottom: 0.5em; }
    .docx-preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    .docx-preview th, .docx-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; vertical-align: top; font-size: 14px; }
    .docx-preview th { background: var(--accent-light); font-weight: 600; }

    /* ── EPUB Reader Layout ──────────────────────────────────────────── */
    .epub-reader { display: flex; flex-direction: column; }
    .epub-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 2; gap: 8px;
    }
    .epub-nav-btn {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); color: var(--text); cursor: pointer;
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all 0.15s; white-space: nowrap;
    }
    .epub-nav-btn:hover:not(:disabled) { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
    .epub-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .epub-nav-title {
      font-family: var(--serif); font-size: 14px; font-weight: 600;
      color: var(--text); flex: 1; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin: 0 4px;
    }
    .epub-nav-toggle {
      display: none; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); cursor: pointer; color: var(--text2); font-size: 16px; line-height: 1;
    }
    .epub-nav-toggle:hover { background: var(--accent-light); color: var(--accent); }

    .epub-layout { display: flex; min-height: 320px; max-height: calc(70vh - 88px); overflow: hidden; }
    .epub-sidebar {
      width: 220px; flex-shrink: 0; border-right: 1px solid var(--border);
      background: var(--bg); display: flex; flex-direction: column;
      overflow: hidden;
    }
    .epub-sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text2);
    }
    .epub-sidebar-close { display: none; background: none; border: none; cursor: pointer; color: var(--text2); padding: 4px; font-size: 16px; }
    .epub-sidebar-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .epub-toc-item {
      padding: 9px 16px; cursor: pointer; font-size: 13px; color: var(--text);
      transition: background 0.15s; border-left: 3px solid transparent;
      line-height: 1.4; word-break: break-word;
    }
    .epub-toc-item:hover { background: var(--accent-light); }
    .epub-toc-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; border-left-color: var(--accent); }
    .epub-toc-item.disabled { cursor: default; color: var(--text2); font-style: italic; font-weight: 500; }
    .epub-toc-item.disabled:hover { background: transparent; }

    .epub-content { flex: 1; overflow-y: auto; min-height: 320px; background: var(--card); }
    .epub-content .preview-reader { min-height: 320px; }

    /* Mobile: sidebar becomes overlay */
    @media (max-width: 720px) {
      .epub-sidebar { display: none; position: fixed; left: 0; top: 0; bottom: 0; width: 280px; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.15); }
      .epub-sidebar.open { display: flex; }
      .epub-sidebar-close { display: block; }
      .epub-nav-toggle { display: inline-flex; }
      .epub-nav-title { font-size: 13px; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .preview-panel.active { max-height: 50vh; }
      .preview-reader { padding: 16px 20px; font-size: 14px; }
      .preview-tab { padding: 10px 14px; font-size: 12px; }
      .epub-nav { padding: 8px 10px; }
      .epub-nav-btn { padding: 4px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header>
    <a href="/" style="text-decoration:none; color:var(--text2); font-size:13px; display:flex; align-items:center; gap:4px; margin-right:12px;" title="返回首页">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="logo" style="display:flex; align-items:center; gap:8px;">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" style="width:30px;height:30px;flex-shrink:0;">
        <circle cx="17" cy="15" r="8" stroke="currentColor" stroke-width="2"/>
        <rect x="3" y="5" width="12" height="17" rx="2" stroke="currentColor" stroke-width="2" fill="var(--bg)"/>
        <path d="M8 10h4M8 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      EbookTranslator
    </span>
    <button class="btn btn-primary" id="btn-open-book" onclick="openFilePicker()" data-i18n="openBook"></button>
    <a href="/guide" class="icon-btn" title="User Guide" style="text-decoration:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </a>
    <button class="icon-btn" onclick="openSettings()" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <input type="file" id="file-input" accept=".epub,.docx,.pdf" style="display:none" onchange="handleFile(this.files[0])">

  <!-- Welcome -->
  <div class="welcome" id="welcome-view">
    <div class="welcome-inner">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </div>
      <h2 data-i18n="welcomeTitle"></h2>
      <p data-i18n="welcomeDesc"></p>
      <div class="upload-zone" id="upload-zone">
        <input type="file" accept=".epub,.docx,.pdf" onchange="handleFile(this.files[0])">
        <p><strong data-i18n="dropHere"></strong><br><span data-i18n="orBrowse"></span></p>
        <div class="upload-progress" id="upload-progress" style="display:none;">
          <div class="up-header">
            <svg class="up-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span class="up-filename" id="up-filename"></span>
          </div>
          <div class="up-track"><div class="up-fill" id="up-fill"></div></div>
          <div class="up-meta">
            <span id="up-loaded">0 KB</span>

function t(key) { return i18n[lang][key] || key; }

function setLang(l) {
  lang = l;
  localStorage.setItem('epub-lang', l);
  document.getElementById('lang-zh').classList.toggle('active', l === 'zh');
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
  applyLang();
  loadLanguages();
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (val.includes('<svg') || val.includes('<')) el.innerHTML = val;
    else el.textContent = val;
  });
  // Update placeholders
  document.getElementById('cfg-key').placeholder = 'sk-xxxxxxxxxxxx';
}

// ── State ─────────────────────────────────────────────────────────
let taskId = null, eventSource = null, timerInterval = null, startTime = 0;
let apiKeyReady = false;

// ── Preview State ─────────────────────────────────────────────────
let previewOpen = false;
let currentFileType = null;  // '.epub', '.pdf', or '.docx'
let epubToc = [];
let epubCover = null;
// Previewer registry — maps file types to previewer instances
const previewers = {};
function registerPreviewer(type, instance) { previewers[type] = instance; }
function getPreviewer(type) { return previewers[type] || null; }

document.addEventListener('DOMContentLoaded', () => { applyLang(); checkConfig(); loadLanguages(); });

// ── Languages ──────────────────────────────────────────────────────
function loadLanguages() {
  fetch('/api/languages?ui=' + lang).then(r=>r.json()).then(list => {
    const sel = document.getElementById('target-lang');
    sel.innerHTML = '';
    list.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.code;
      opt.textContent = l.name;
      if (l.code === 'zh-CN') opt.selected = true;
      sel.appendChild(opt);
    });
  });
}

// ── Config ────────────────────────────────────────────────────────
function checkConfig() {
  fetch('/api/config').then(r=>r.json()).then(c => {
    if (c.api_key_set) {
      apiKeyReady = true;
      document.getElementById('btn-open-book').disabled = false;
    } else {
      apiKeyReady = false;
      document.getElementById('btn-open-book').disabled = true;
      openSettings();
    }
  }).catch(()=>{});
}
function openSettings() {
  fetch('/api/config').then(r=>r.json()).then(c => {
    document.getElementById('cfg-key').value = '';
    document.getElementById('cfg-base').value = c.api_base||'';
    document.getElementById('cfg-model').value = c.model||'';
    document.getElementById('cfg-mode').value = c.translation_mode||'bilingual';
    document.getElementById('cfg-key-hint').innerHTML = c.api_key_set
      ? t('currentKey')+c.api_key_masked
      : t('notConfigured') + ' — <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:var(--accent);text-decoration:underline;">' + t('applyKey') + '</a>';
    const badge = document.getElementById('cfg-encrypted-badge');
    badge.style.display = (c.api_key_set && c.api_key_encrypted) ? 'inline-block' : 'none';
    const warning = document.getElementById('api-key-warning');
    warning.style.display = c.api_key_set ? 'none' : 'flex';
    // OCR settings
    document.getElementById('cfg-ocr-enabled').value = c.ocr_enabled ? 'true' : 'false';
    document.getElementById('settings-modal').classList.add('active');
  });
}
function checkKeyInput() {
  const val = document.getElementById('cfg-key').value.trim();
  const warning = document.getElementById('api-key-warning');
  warning.style.display = val ? 'none' : 'flex';
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('active'); }
function saveSettings() {
  const b = { api_base: document.getElementById('cfg-base').value, model: document.getElementById('cfg-model').value, translation_mode: document.getElementById('cfg-mode').value };
  const k = document.getElementById('cfg-key').value.trim();
  if (k) b.api_key = k;
  // OCR settings
  b.ocr_enabled = document.getElementById('cfg-ocr-enabled').value === 'true';
  const btn = document.getElementById('btn-save'); btn.textContent=t('saving'); btn.disabled=true;
  fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})
    .then(r=>r.json()).then((resp)=>{
      btn.textContent=t('saved');
      apiKeyReady = true;
      document.getElementById('btn-open-book').disabled = false;
      const actionBtn = document.getElementById('btn-action');
      if (actionBtn) actionBtn.disabled = false;
      setTimeout(()=>{closeSettings();btn.textContent=t('save');btn.disabled=false;},500);
    })
    .catch(e=>{ btn.textContent=t('save'); btn.disabled=false; toast(t('uploadFail')+e.message,'error'); });
}

// ── Upload ────────────────────────────────────────────────────────
function openFilePicker() { document.getElementById('file-input').click(); }
const uz = document.getElementById('upload-zone');
if (uz) {
  ['dragenter','dragover'].forEach(e => uz.addEventListener(e,ev=>{ev.preventDefault();uz.classList.add('dragover');}));
  ['dragleave','drop'].forEach(e => uz.addEventListener(e,ev=>{ev.preventDefault();uz.classList.remove('dragover');}));
  uz.addEventListener('drop', ev => { const f=ev.dataTransfer.files[0]; if(f) handleFile(f); });
}

function showUploadProgress(file) {
  const up = document.getElementById('upload-progress');
  uz.classList.add('uploading');
  up.style.display = '';
  document.getElementById('up-filename').textContent = file.name;
  document.getElementById('up-fill').style.width = '0%';
  document.getElementById('up-pct').textContent = '0%';
  document.getElementById('up-loaded').textContent = '0 KB';
  document.getElementById('up-total').textContent = fmtSize(file.size);
}

function updateUploadProgress(loaded, total) {
  const pct = Math.round(loaded / total * 100);
  document.getElementById('up-fill').style.width = pct + '%';
  document.getElementById('up-pct').textContent = pct + '%';
  document.getElementById('up-loaded').textContent = fmtSize(loaded);
}

function hideUploadProgress() {
  uz.classList.remove('uploading');
  document.getElementById('upload-progress').style.display = 'none';
}

function autoOpenPreview() {
  const previewBtn = document.getElementById('btn-preview');
  if (previewBtn.style.display !== 'none' && !previewOpen) {
    togglePreview();
  }
}

function handleFile(file) {
  if (!file) return;
  const ext = file.name.toLowerCase().split('.').pop();
  if (!['epub','docx','pdf'].includes(ext)) { toast(t('selectFile'),'error'); return; }
  if (file.size > 100*1024*1024) { toast(t('fileTooLarge'),'error'); return; }

  // Reset preview
  const panel = document.getElementById('preview-panel');
  panel.classList.remove('active');
  panel.dataset.loaded = '';
  previewOpen = false;
  document.getElementById('btn-preview').classList.remove('active');
  document.getElementById('scanned-badge').classList.remove('show');

  // Restore welcome view so upload progress is visible
  document.getElementById('welcome-view').style.display = '';
  document.getElementById('book-view').classList.remove('active');

  // Show upload progress
  showUploadProgress(file);

  // Use XMLHttpRequest for upload progress tracking
  const form = new FormData(); form.append('file', file);
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload');

  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) updateUploadProgress(e.loaded, e.total);
  });

  xhr.addEventListener('load', () => {
    hideUploadProgress();
    if (xhr.status === 200) {
      try {
        const data = JSON.parse(xhr.responseText);
        if (data.detail) { toast(data.detail,'error'); return; }
        taskId = data.task_id;
        showBook(data, file.size);
        toast(t('bookLoaded'),'');
      } catch (e) { toast(t('uploadFail')+e.message,'error'); }
    } else {
      let errMsg = t('uploadFail');
      try { const e = JSON.parse(xhr.responseText); errMsg += e.detail || xhr.statusText; }
      catch (_) { errMsg += xhr.statusText || 'Server error'; }
      toast(errMsg, 'error');
    }
  });

  xhr.addEventListener('error', () => {
    hideUploadProgress();
    toast(t('uploadFail') + 'Network error', 'error');
  });

  xhr.timeout = 120000;
  xhr.addEventListener('timeout', () => {
    hideUploadProgress();
    xhr.abort();
    toast(t('uploadFail') + t('uploadTimeout'), 'error');
  });

  xhr.send(form);
}

function showBook(data, fileSize) {
  document.getElementById('welcome-view').style.display = 'none';
  document.getElementById('book-view').classList.add('active');
  document.getElementById('book-title').textContent = data.title || data.filename;
  document.getElementById('book-author').textContent = data.author || '';
  const isPdf = data.filename && data.filename.toLowerCase().endsWith('.pdf');
  const isEpub = data.filename && data.filename.toLowerCase().endsWith('.epub');
  const isDocx = data.filename && data.filename.toLowerCase().endsWith('.docx');
  document.getElementById('trans-engine').style.display = isPdf ? '' : 'none';
  document.getElementById('book-size').innerHTML = '<strong>' + fmtSize(fileSize) + '</strong>';
  document.getElementById('book-date').innerHTML = '<strong>' + new Date().toLocaleDateString() + '</strong>';

  // Store preview data
  currentFileType = isPdf ? '.pdf' : (isEpub ? '.epub' : (isDocx ? '.docx' : null));
  epubToc = data.toc || [];
  epubCover = data.cover || null;

  // Show scanned badge if applicable
  const scannedBadge = document.getElementById('scanned-badge');
  if (data.is_scanned) {
    scannedBadge.classList.add('show');
  } else {
    scannedBadge.classList.remove('show');
  }

  // Show/hide preview button
  const previewBtn = document.getElementById('btn-preview');
  if (currentFileType === '.epub' || currentFileType === '.pdf' || currentFileType === '.docx') {
    previewBtn.style.display = 'inline-flex';
  } else {
    previewBtn.style.display = 'none';
  }

  // Reset preview panel
  const panel = document.getElementById('preview-panel');
  panel.classList.remove('active');
  panel.dataset.loaded = '';
  previewOpen = false;
  previewBtn.classList.remove('active');

  showStartButton();
  if (!apiKeyReady) {
    document.getElementById('btn-action').disabled = true;
    openSettings();
  }
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

// ── Translation ───────────────────────────────────────────────────
function toggleTranslation() {
  if (!apiKeyReady) { openSettings(); return; }
  const btn = document.getElementById('btn-action');
  const status = btn.dataset.status;
  if (!status || status === 'done' || status === 'error' || status === 'stopped') {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Starting...';
    btn.classList.remove('btn-primary','btn-download','btn-danger'); btn.classList.add('btn-ghost'); btn.disabled = true;
    // Close preview panel when starting translation
    if (previewOpen) togglePreview();
    const targetLang = document.getElementById('target-lang').value;
    const transMode = document.getElementById('trans-mode').value;
    const engine = document.getElementById('trans-engine').value;
    const isBabeldoc = (engine === 'babeldoc');
    const apiRoute = isBabeldoc ? `/api/start_babeldoc/${taskId}` : `/api/start/${taskId}`;
    const bodyData = isBabeldoc
      ? JSON.stringify({target_lang: targetLang, bilingual: transMode === 'bilingual'})
      : JSON.stringify({target_lang: targetLang, bilingual: transMode === 'bilingual', pdf_method: engine});
    fetch(apiRoute,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: bodyData
    }).then(r=>r.json()).then(() => {
      btn.disabled = false; showStopButton(); startProgress();
    }).catch(e => { btn.disabled = false; showStartButton(); toast(t('startFail')+e.message,'error'); });
  } else if (status === 'translating' || status === 'loading' || status === 'queued') {
    fetch(`/api/stop/${taskId}`,{method:'POST'}).then(()=>{});
    btn.innerHTML = 'Stopping...'; btn.disabled = true;
    // Fallback: force enable after 5s if SSE hasn't received 'stopped' yet
    const fallbackId = 'stop-fallback-' + taskId;
    clearTimeout(window[fallbackId]);
    window[fallbackId] = setTimeout(() => {
      if (btn.dataset.status !== '') { showStartButton(); }
      clearInterval(timerInterval);
      if (eventSource) eventSource.close();
    }, 5000);
  }
}
function showStopButton() {
  const btn = document.getElementById('btn-action'); btn.dataset.status = 'translating';
  btn.innerHTML = t('stopBtn'); btn.disabled = false;
  btn.classList.remove('btn-primary','btn-download'); btn.classList.add('btn-danger');
}
function showStartButton() {
  const btn = document.getElementById('btn-action'); btn.dataset.status = '';
  btn.innerHTML = t('startBtn'); btn.disabled = false;
  btn.classList.remove('btn-danger','btn-download'); btn.classList.add('btn-primary'); btn.onclick = toggleTranslation;
}
function showDownloadButton() {
  const btn = document.getElementById('btn-action'); btn.dataset.status = 'done';
  btn.innerHTML = t('downloadBtn'); btn.disabled = false;
  btn.classList.remove('btn-danger','btn-primary'); btn.classList.add('btn-download');
  btn.onclick = () => { window.location = `/api/download/${taskId}`; };
}

// ── Progress ──────────────────────────────────────────────────────
function startProgress() {
  startTime = Date.now();
  document.getElementById('progress-bar').classList.add('active');
  timerInterval = setInterval(() => { document.getElementById('progress-time').textContent = fmtTime((Date.now()-startTime)/1000); }, 1000);
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`/api/progress/${taskId}`);
  eventSource.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.status === 'translating') {
      // EPUB: file count for progress. DOCX/PDF: fragment count
      const multiFile = (d.total_files||0) > 1;
      const done = multiFile ? (d.current_file||0) : (d.file_progress||0);
      const total = multiFile ? (d.total_files||0) : (d.file_total||0);
      const pct = total>0 ? Math.round(done/total*100) : 0;
      const unit = multiFile ? t('files') : t('fragments');
      document.getElementById('progress-fill').style.width = pct+'%';
      document.getElementById('progress-pct').textContent = pct+'%';
      document.getElementById('progress-files').innerHTML = `${done} / ${total} ${unit}`;
      document.getElementById('progress-label').textContent = d.file_name ? d.file_name.split('/').pop() : t('translating');
      showStopButton();
    } else if (d.status === 'done') { finishProgress(d); }
    else if (d.status === 'error') { errorProgress(d); }
    else if (d.status === 'stopped') { stoppedProgress(); }
  };
  eventSource.onerror = () => { eventSource.close(); };
}
function finishProgress(d) {
  clearInterval(timerInterval); eventSource.close();
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-label').textContent = t('done');
  document.getElementById('progress-files').innerHTML = `${d.translated||0} translated · ${d.cached||0} cached · ${fmtTime((Date.now()-startTime)/1000)}`;
  showDownloadButton(); toast(t('transComplete'),'success');
}
function errorProgress(d) { clearInterval(timerInterval); eventSource.close(); document.getElementById('progress-label').textContent = 'Error: '+(d.error||'Unknown'); showStartButton(); toast(d.error||t('transFailed'),'error'); }
function stoppedProgress() { clearInterval(timerInterval); eventSource.close(); clearTimeout(window['stop-fallback-'+taskId]); document.getElementById('progress-label').textContent = t('stopped'); showStartButton(); toast(t('transStopped'),''); }

// ── Helpers ───────────────────────────────────────────────────────
function toast(msg, type) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast'+(type==='success'?' toast-success':'')+(type==='error'?' toast-error':''); setTimeout(()=>el.classList.add('show'),10); setTimeout(()=>el.classList.remove('show'),3000); }
function fmtTime(s) { if (s<60) return Math.round(s)+'s'; return Math.floor(s/60)+'m '+Math.round(s%60)+'s'; }

// ── Preview Registry ──────────────────────────────────────────────
// Each previewer implements: { load(tabsEl, contentEl) }
function togglePreview() {
  const panel = document.getElementById('preview-panel');
  const btn = document.getElementById('btn-preview');
  previewOpen = !previewOpen;
  panel.classList.toggle('active', previewOpen);
  btn.classList.toggle('active', previewOpen);
  if (previewOpen && !panel.dataset.loaded) {
    panel.dataset.loaded = 'true';
    const previewer = getPreviewer(currentFileType);
    if (previewer) previewer.load(document.getElementById('preview-tabs'), document.getElementById('preview-content'));
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── EPUB Previewer ──────────────────────────────────────────────────
registerPreviewer('.epub', new (function() {
  let currentChapter = -1;

  this.openCover = function() {
    currentChapter = -1;
    document.querySelectorAll('.epub-toc-item').forEach(el => el.classList.remove('active'));
    const first = document.querySelector('.epub-toc-item');
    if (first) first.classList.add('active');
    document.getElementById('epub-title').textContent = 'Cover';
    document.getElementById('epub-content').innerHTML =
      `<div class="preview-reader" style="display:flex;align-items:center;justify-content:center;min-height:400px;"><div class="preview-cover"><img src="${epubCover}" alt="Cover"></div></div>`;
    document.getElementById('epub-prev').disabled = true;
    document.getElementById('epub-next').disabled = epubToc.length === 0;
    closeSidebar();
  };

  this.openChapter = function(index) {
    if (index < 0 || index >= epubToc.length) return;
    const ch = epubToc[index];
    if (!ch.href) return;

    currentChapter = index;
    document.querySelectorAll('.epub-toc-item').forEach(el => el.classList.remove('active'));
    const item = document.querySelector(`.epub-toc-item[data-index="${index}"]`);
    if (item) item.classList.add('active');

    document.getElementById('epub-title').textContent = ch.title || `Chapter ${index + 1}`;
    const epubContent = document.getElementById('epub-content');
    epubContent.innerHTML = '<div class="preview-reader preview-reader-loading">Loading chapter...</div>';

    fetch(`/api/book/${taskId}/content?path=${encodeURIComponent(ch.href)}`)
      .then(r => { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
      .then(data => { epubContent.innerHTML = `<div class="preview-reader">${data.html}</div>`; })
      .catch(() => {
        ch.href = '';
        const el = document.querySelector(`.epub-toc-item[data-index="${index}"]`);
        if (el) { el.classList.remove('active'); el.classList.add('disabled'); el.removeAttribute('onclick'); }
        epubContent.innerHTML = '<div class="preview-reader" style="text-align:center;padding:48px;color:var(--text2);font-size:13px;">Content not available</div>';
        this.navChapter(1);
      });

    let prevIdx = index - 1;
    while (prevIdx >= 0 && !epubToc[prevIdx].href) prevIdx--;
    let nextIdx = index + 1;
    while (nextIdx < epubToc.length && !epubToc[nextIdx].href) nextIdx++;
    document.getElementById('epub-prev').disabled = prevIdx < 0;
    document.getElementById('epub-next').disabled = nextIdx >= epubToc.length;
    closeSidebar();
  };

  this.navChapter = function(dir) {
    let next = currentChapter + dir;
    if (dir < 0 && currentChapter === -1 && epubCover) { this.openCover(); return; }
    if (next < -1 || next >= epubToc.length) return;
    if (next === -1 && epubCover) { this.openCover(); return; }
    while (next >= 0 && next < epubToc.length && !epubToc[next].href) next += dir;
    if (next < 0 || next >= epubToc.length) return;
    this.openChapter(next);
  };

  this.load = function(tabsEl, contentEl) {
    tabsEl.innerHTML = '';
    currentChapter = -1;
    const hasCover = !!epubCover;
    const hasToc = epubToc.length > 0;
    if (!hasCover && !hasToc) {
      contentEl.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text2);">No content to preview</div>';
      return;
    }

    let sidebarHtml = '';
    if (hasCover) {
      sidebarHtml += `<div class="epub-toc-item${!hasToc ? ' active' : ''}" onclick="getPreviewer('.epub').openCover()">📖 Cover</div>`;
    }
    if (hasToc) {
      epubToc.forEach((ch, i) => {
        const hasLink = !!ch.href;
        const padLeft = 16 + (ch.depth || 0) * 18;
        const cls = 'epub-toc-item' + (hasLink ? '' : ' disabled');
        sidebarHtml += `<div class="${cls}" onclick="${hasLink ? `getPreviewer('.epub').openChapter(${i})` : ''}" data-index="${i}" style="padding-left:${padLeft}px">${escapeHtml(ch.title || '(untitled)')}</div>`;
      });
    }

    contentEl.innerHTML = `
      <div class="epub-reader">
        <div class="epub-nav">
          <button class="epub-nav-btn" id="epub-prev" onclick="getPreviewer('.epub').navChapter(-1)" disabled>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Prev
          </button>
          <button class="epub-nav-toggle" id="epub-menu-toggle" onclick="toggleSidebar()">☰</button>
          <span class="epub-nav-title" id="epub-title">${hasCover ? 'Cover' : (hasToc ? escapeHtml(epubToc[0].title || 'Chapter 1') : '')}</span>
          <button class="epub-nav-btn" id="epub-next" onclick="getPreviewer('.epub').navChapter(1)"${hasToc && epubToc.length > 1 ? '' : ' disabled'}>
            Next <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="epub-layout">
          <div class="epub-sidebar" id="epub-sidebar">
            <div class="epub-sidebar-header">
              <span>Contents</span>
              <button class="epub-sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="epub-sidebar-list">${sidebarHtml}</div>
          </div>
          <div class="epub-content" id="epub-content">
            ${hasCover ? '<div class="preview-reader" style="display:flex;align-items:center;justify-content:center;min-height:400px;"><div class="preview-cover"><img src="' + epubCover + '" alt="Cover"></div></div>' : '<div class="preview-reader preview-reader-loading">Loading...</div>'}
          </div>
        </div>
      </div>`;

    if (hasCover) {
      const first = document.querySelector('.epub-toc-item');
      if (first) first.classList.add('active');
    } else if (hasToc) {
      this.openChapter(0);
    }
  };
})());

// ── PDF Previewer ───────────────────────────────────────────────────
registerPreviewer('.pdf', new (function() {
  let pageCount = 0;

  function switchTab(tab) {
    document.querySelectorAll('#preview-tabs .preview-tab').forEach(t => t.classList.remove('active'));
    const active = document.querySelector(`#preview-tabs .preview-tab[data-tab="${tab}"]`);
    if (active) active.classList.add('active');
    if (tab === 'pages') renderPages();
    else if (tab === 'text') renderText();
  }

  function renderPages() {
    const contentEl = document.getElementById('preview-content');
    let html = '<div class="preview-pages">';
    for (let i = 0; i < pageCount; i++) {
      html += `
        <div class="preview-page-wrap" data-page="${i}">
          <img class="preview-page-img" data-src="/api/book/${taskId}/pdf-page?page=${i}&scale=1.0" alt="Page ${i + 1}" loading="lazy">
          <div class="preview-page-label">Page ${i + 1} / ${pageCount}</div>
        </div>`;
    }
    html += '</div>';
    contentEl.innerHTML = html;

    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src && !img.src) { img.src = img.dataset.src; observer.unobserve(img); }
          }
        });
      }, { rootMargin: '200px' });
      document.querySelectorAll('.preview-page-img').forEach(img => observer.observe(img));
    } else {
      document.querySelectorAll('.preview-page-img[data-src]').forEach(img => { img.src = img.dataset.src; });
    }
  }

  function renderText() {
    const contentEl = document.getElementById('preview-content');
    contentEl.innerHTML = '<div class="preview-reader preview-reader-loading">Loading text...</div>';
    let loaded = 0;
    const batchSize = 5;

    function loadBatch() {
      const start = loaded;
      const end = Math.min(loaded + batchSize, pageCount);
      if (start >= pageCount) return;
      const promises = [];
      for (let i = start; i < end; i++) {
        promises.push(fetch(`/api/book/${taskId}/pdf-text?page=${i}`).then(r => r.json()).catch(() => ({page: i, text: ''})));
      }
      Promise.all(promises).then(results => {
        if (start === 0) {
          contentEl.innerHTML = '';
          const c = document.createElement('div'); c.id = 'preview-text-container';
          contentEl.appendChild(c);
        }
        const c2 = document.getElementById('preview-text-container');
        results.forEach(r => {
          const d = document.createElement('div'); d.className = 'preview-text-page';
          d.innerHTML = `<div class="preview-text-header">Page ${r.page + 1}</div><div class="preview-text-content">${escapeHtml(r.text || '(No text)')}</div>`;
          c2.appendChild(d);
        });
        loaded = end;
        if (loaded < pageCount) {
          let btn = document.getElementById('pdf-text-load-more');
          if (!btn) {
            btn = document.createElement('button'); btn.id = 'pdf-text-load-more'; btn.className = 'btn btn-ghost';
            btn.style.cssText = 'display:block;margin:16px auto;';
            btn.textContent = `Load next ${batchSize} pages...`;
            btn.onclick = () => { btn.remove(); loadBatch(); };
            c2.appendChild(btn);
          }
        } else { const b = document.getElementById('pdf-text-load-more'); if (b) b.remove(); }
      });
    }
    loadBatch();
  }

  this.load = function(tabsEl, contentEl) {
    tabsEl.innerHTML = '<div class="preview-reader preview-reader-loading">Loading PDF info...</div>';
    fetch(`/api/book/${taskId}/pdf-info`)
      .then(r => r.json())
      .then(info => {
        pageCount = info.page_count;
        tabsEl.innerHTML = `
          <button class="preview-tab active" data-tab="pages" onclick="getPreviewer('.pdf').switchTab('pages')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Pages (${info.page_count})
          </button>
          <button class="preview-tab" data-tab="text" onclick="getPreviewer('.pdf').switchTab('text')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> Text
          </button>`;
        switchTab('pages');
      })
      .catch(err => { contentEl.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2);">${escapeHtml(err.message)}</div>`; });
  };
})());

// ── DOCX Previewer ──────────────────────────────────────────────────
registerPreviewer('.docx', new (function() {
  this.load = function(tabsEl, contentEl) {
    tabsEl.innerHTML = '';
    contentEl.innerHTML = '<div class="preview-reader preview-reader-loading">Loading document...</div>';

    fetch(`/api/book/${taskId}/docx-content`)
      .then(r => { if (!r.ok) throw new Error('Failed to load DOCX content'); return r.json(); })
      .then(data => {
        contentEl.innerHTML = data.html;
        // Apply virtual scrolling to top-level blocks
        contentEl.querySelectorAll('.preview-reader > *').forEach(el => {
          el.style.contentVisibility = 'auto';
          el.style.containIntrinsicSize = 'auto 80px';
        });
      })
      .catch(err => { contentEl.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2);">${escapeHtml(err.message)}</div>`; });
  };
})());

// ── Shared sidebar helpers (used by EPUB template HTML) ─────────────
function toggleSidebar() { document.getElementById('epub-sidebar').classList.toggle('open'); }
function closeSidebar() { document.getElementById('epub-sidebar').classList.remove('open'); }
</script>
