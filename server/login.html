<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — EbookTranslator</title>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FCF9F5; --card: #FFFFFF; --text: #2D2D2D; --text2: #8A8A8A;
      --accent: #C8956C; --accent-hover: #B8845B; --accent-light: #F5EDE6;
      --border: #EDE8E2; --serif: 'Noto Serif SC', 'Georgia', serif;
      --sans: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --radius: 16px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px; width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center; }
    .logo { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 32px; }
    .icon { width: 56px; height: 56px; border-radius: 18px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .icon svg { width: 24px; height: 24px; color: var(--accent); }
    h2 { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
    a { color: var(--accent); text-decoration: none; font-size: 14px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <a href="/" style="text-decoration:none;"><div class="logo">EbookTranslator</div></a>
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
  <h2>登录功能即将上线</h2>
  <p>我们正在开发中，敬请期待。</p>
  <a href="/">← 返回首页</a>
</div>
</body>
</html>
